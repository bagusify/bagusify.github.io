<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagusify | Digital Architect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="bg-light">
    <nav id="mobile-dock" class="mobile-bottom-dock d-md-none">
        <button class="dock-btn text-teal" onclick="togglePanel('left', event)">
            <span class="d-block small text-muted mb-1">Explore</span>
            CUSTOM APPS
        </button>
        <div class="dock-divider"></div>
        <button class="dock-btn text-gold" onclick="togglePanel('right', event)">
            <span class="d-block small text-muted mb-1">Create</span>
            WEDDING
        </button>
    </nav>

    <aside id="panel-left" class="side-panel">
        <div class="panel-trigger" onclick="togglePanel('left', event)">
            <span class="label-vertical text-teal">CUSTOM SOLUTIONS</span>
        </div>
        <div class="panel-inner">
            <div class="panel-header d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="display-5 fw-bold text-teal">Kategori Layanan</h2>
                    <p class="text-muted">Pilih paket pengembangan sesuai skala kebutuhan Anda.</p>
                </div>
                <div class="pricing-toggle-container">
                    <span class="me-2 small fw-bold">Bulanan</span>
                    <div class="form-check form-switch d-inline-block">
                        <input class="form-check-input" type="checkbox" id="priceToggle" onchange="updatePriceView()">
                    </div>
                    <span class="ms-1 small fw-bold">Tahunan</span>
                </div>
            </div>
            <div id="custom-apps-grid" class="row g-3">
                </div>
        </div>
    </aside>

    <aside id="panel-right" class="side-panel">
        <div class="panel-trigger" onclick="togglePanel('right', event)">
            <span class="label-vertical text-gold">WEDDING INVITATION</span>
        </div>
        <div class="panel-inner">
            <div class="panel-header mb-5">
                <h2 class="display-5 fw-bold text-gold">Eternal Invitations</h2>
                <p class="text-muted">Abadikan momen spesial dengan undangan digital premium.</p>
            </div>
            <div id="wedding-grid" class="row g-4 justify-content-center">
                </div>
        </div>
    </aside>

    <script src="src/js/app.js"></script>
</body>
</html>
